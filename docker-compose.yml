version: '3.9'

# JARVIS Docker Compose
# Usage: docker-compose up
# Text mode: docker-compose run jarvis python -m jarvis.main chat

services:
  jarvis:
    build:
      context: .
      dockerfile: Dockerfile
    image: jarvis-ai:latest
    container_name: jarvis

    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      # Optional overrides:
      # - LLM_MODEL=qwen3:4b
      # - OUTPUT_MODE=voice
      # - WAKE_WORDS=jarvis,hey jarvis

    # For voice mode: Give access to audio devices (Linux only)
    devices:
      - /dev/snd:/dev/snd

    volumes:
      # Mount your .env (LLM, API keys, etc.)
      # Ensure jarvis/.env exists first: cp jarvis/.env.example jarvis/.env
      - ./jarvis/.env:/app/jarvis/.env:ro
      # Optional: persistent memory
      # - jarvis-data:/home/jarvisuser/.jarvis

    stdin_open: true
    tty: true

    # Default: dual input mode
    # For text chat: command: python -m jarvis.main chat

# volumes:
#   jarvis-data:
