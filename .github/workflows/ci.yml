name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: Lint and format checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install project with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run Black (check mode)
        run: black --check .

      - name: Run isort (check mode)
        run: isort --check-only .

      - name: Run Flake8
        run: flake8 .

  typecheck:
    name: Type checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install project with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run mypy
        run: mypy jarvis

  tests:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install project with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest
